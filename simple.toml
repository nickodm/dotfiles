# Theme made for simple terminals that can't handle icons, powerlines and background colors.

#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

console_title_template = "{{ .Shell }} in {{ .Folder }}"
version = 3
final_space = true

[palette]
black = "#262B44"
blue = "#4B95E9"
green = "#59C9A5"
orange = "#F07623"
red = "#D81E5B"
white = "#E0DEF4"
yellow = "#F3AE35"

[secondary_prompt]
template = "<p:blue,transparent></><,p:blue> > </><p:blue,transparent></> "
foreground = "p:white"
background = "transparent"

[transient_prompt]
template = "<p:green,transparent></><,p:green> {{ .Folder }} </><p:green,transparent></> "
foreground = "p:black"
background = "transparent"

[upgrade]
source = "cdn"
interval = "168h"
auto = true
notice = true

[[blocks]]
type = "prompt"
alignment = "left"

#* ----- OS ------
  [[blocks.segments]]
  type = "os"
  style = "plain"
  template = "[{{.OS}}] "
  foreground = "p:blue"
  foreground_templates = [
  "{{ if eq .OS \"ubuntu\" }}p:red{{ end }}",
  "{{ if eq .OS \"android\" }}p:green{{ end }}"
]

#* ----- PATH ------
  [[blocks.segments]]
  template = "{{ path .Path .Location }} "
  foreground = "p:green"
  type = "path"
  style = "plain"

    [blocks.segments.options]
    style = "folder"

#* ----- PYTHON VENV ------
  [[blocks.segments]]
  template = "  {{ if .Venv }}{{ .Full }}{{ end }} "
  foreground = "p:red"
  type = "python"
  style = "plain"

    [blocks.segments.options]
    fetch_virtual_env = true
    display_mode = "environment"

#* ----- RUST ------
  [[blocks.segments]]
  type = "rust"
  template = "{{ .Full }} "
  style = "plain"
  foreground = "p:orange"

#* ----- GIT ------
  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground = "p:orange"
  template = "({{ .HEAD }}) "

    [blocks.segments.properties]
    branch_icon = "" # Hide the git icon

    [blocks.segments.options]
    branch_template = "{{ trunc 25 .Branch }}"
    fetch_status = false
    fetch_upstream_icon = false

#* ----- ROOT ------
  [[blocks.segments]]
  type = "root"
  template = "(root) "
  foreground = "p:red"
  style = "plain"

#* ----- STATUS ------
  [[blocks.segments]]
  type = "status"
  template = ">"
  foreground = "p:green"
  style = "plain"
  foreground_templates = [ "{{ if gt .Code 0 }}p:red{{ end }}" ]

    [blocks.segments.properties]
    always_enabled = true

[[blocks]]
type = "rprompt"

  [[blocks.segments]]
  template = " "
  foreground = "p:green"
  background = "transparent"
  type = "node"
  style = "plain"

    [blocks.segments.options]
    display_mode = "files"
    fetch_package_manager = false
    home_enabled = false

  [[blocks.segments]]
  template = " "
  foreground = "p:blue"
  background = "transparent"
  type = "go"
  style = "plain"

    [blocks.segments.options]
    fetch_version = false

  [[blocks.segments]]
  template = " "
  foreground = "p:yellow"
  background = "transparent"
  type = "python"
  style = "plain"

    [blocks.segments.options]
    display_mode = "files"
    fetch_version = false
    fetch_virtual_env = false

  [[blocks.segments]]
  template = "in <p:blue><b>{{ .Name }}</b></> "
  foreground = "p:white"
  background = "transparent"
  type = "shell"
  style = "plain"

[[tooltips]]
leading_diamond = ""
trailing_diamond = ""
template = "  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} "
foreground = "p:white"
background = "p:orange"
type = "aws"
style = "diamond"
tips = [ "aws" ]

  [tooltips.options]
  display_default = true

[[tooltips]]
leading_diamond = ""
trailing_diamond = ""
template = "  {{ .Name }} "
foreground = "p:white"
background = "p:blue"
type = "az"
style = "diamond"
tips = [ "az" ]

  [tooltips.options]
  display_default = true

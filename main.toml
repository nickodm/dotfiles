# My main theme for any bash or powershell terminal

#: schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

console_title_template = "{{ .Shell }} in {{ .Folder }}"
version = 3
final_space = true

[palette]
black = "#262B44"
blue = "#4B95E9"
green = "#59C9A5"
orange = "#F07623"
red = "#D81E5B"
white = "#E0DEF4"
yellow = "#F3AE35"

[secondary_prompt]
template = "<p:blue,transparent></><,p:blue> > </><p:blue,transparent></> "
foreground = "p:white"
background = "transparent"

[transient_prompt]
template = "<p:green,transparent></><,p:green> {{ .Folder }} </><p:green,transparent></> "
foreground = "p:black"
background = "transparent"

[upgrade]
source = "cdn"
interval = "168h"
auto = true
notice = true

[[blocks]]
type = "prompt"
alignment = "left"

#* ----- OS -----
  [[blocks.segments]]
  type = "os"
  style = "diamond"
  leading_diamond = ""
  template = "{{.Icon}} {{.OS}} "
  background = "p:white"
  foreground = "p:blue"
  foreground_templates = [ 
    "{{ if eq .OS \"ubuntu\" }}p:red{{ end }}",
    "{{ if eq .OS \"android\" }}p:green{{ end }}"
  ]

#* ----- PATH -----
  [[blocks.segments]]
  type = "path"
  style = "diamond"
  template = "  {{ path .Path .Location }} "
  leading_diamond = ""
  trailing_diamond = ""
  foreground = "p:black"
  powerline_symbol = ""
  background = "p:green"

    [blocks.segments.options]
    style = "folder"

#* ----- PYTHON VENV -----
  [[blocks.segments]]
  type = "python"
  style = "diamond"
  template = "  {{ if .Venv }}{{ .Full }}{{ end }} "
  powerline_symbol = ""
  foreground = "p:white"
  background = "p:red"
  leading_diamond = "<transparent,background></>"
  trailing_diamond = ""

    [blocks.segments.options]
    fetch_virtual_env = true
    display_mode = "environment"

#* ----- RUST -----
  [[blocks.segments]]
  type = "rust"
  style = "diamond"
  template = "  {{ .Full }} "
  leading_diamond = "<transparent,background></>"
  trailing_diamond = ""
  powerline_symbol = ""
  foreground = "p:white"
  background = "p:red"

#* ----- GIT -----
  [[blocks.segments]]
  type = "git"
  style = "powerline"
  template = " {{ .HEAD }} "
  powerline_symbol = ""
  foreground = "p:white"
  background = "p:orange"

    [blocks.segments.options]
    branch_template = "{{ trunc 25 .Branch }}"
    fetch_status = false
    fetch_upstream_icon = false

#* ----- ROOT -----
  [[blocks.segments]]
  type = "root"
  style = "powerline"
  template = "  "
  foreground = "p:red"
  powerline_symbol = ""
  background = "p:white"

#* ----- STATUS -----
  [[blocks.segments]]
  type = "status"
  style = "diamond"
  template = " {{ if gt .Code 0 }}{{ else }}{{ end }} "
  leading_diamond = "<transparent,background></>"
  trailing_diamond = ""
  foreground = "p:white"
  background = "p:blue"
  background_templates = [ "{{ if gt .Code 0 }}p:red{{ end }}" ]

    [blocks.segments.properties]
    always_enabled = true
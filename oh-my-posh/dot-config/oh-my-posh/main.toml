# My main theme for any bash or powershell terminal

#: schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

console_title_template = "({{ .Shell }}) {{ .UserName }}@{{ .HostName }}:{{ .PWD }}"
version = 3
final_space = true

[palette]
black = "#262B44"
blue = "#4B95E9"
green = "#59C9A5"
orange = "#F07623"
red = "#D81E5B"
white = "#E0DEF4"
yellow = "#F3AE35"

[secondary_prompt]
template = "<p:blue,transparent></><,p:blue> > </><p:blue,transparent></> "
foreground = "p:white"
background = "transparent"

[transient_prompt]
template = """\
{{ if eq .Code 0 }}<p:black,p:green>{{ else }}<p:white,p:red>{{ .Code }}{{ end }} {{ .PWD }} </>\
{{ if eq .Code 0 }}<p:green,transparent>{{ else }}<p:red,transparent>{{ end }}</> \
"""

[upgrade]
source = "cdn"
interval = "168h"
auto = true
notice = true

[[blocks]]
type = "prompt"
alignment = "left"

#* ----- OS -----
  [[blocks.segments]]
  type = "os"
  style = "powerline"
  powerline_symbol = ""
  leading_powerline_symbol = ""
  template = " {{ .Icon }} {{ .OS }} "
  background = "p:black"
  foreground = "p:blue"
  foreground_templates = [
    "{{ if eq .OS \"ubuntu\" }}p:red{{ end }}",
    "{{ if eq .OS \"android\" }}p:green{{ end }}",
    "{{ if eq .OS \"debian\" }}p:red{{ end }}",
  ]

    [blocks.segments.properties]
    arch = "\uF303"

#* ----- BATTERY -----

  [[blocks.segments]]
  type = "battery"
  style = "powerline"
  powerline_symbol = ""
  template = " {{ if lt .Percentage 30}}󰁺{{ else if lt .Percentage 50}}󰁾{{ else }}󰁹{{ end }} {{ .Percentage }}% "

  background_templates = [
    "{{ if lt .Percentage 30 }}p:red{{ end }}",
    "{{ if lt .Percentage 50 }}p:orange{{ end }}",
    "{{ if le .Percentage 100 }}p:green{{ end }}",
  ]

  foreground_templates = [
    "{{ if lt .Percentage 50 }}p:white{{ end }}",
    "{{ if le .Percentage 100 }}p:black{{ end }}",
  ]

#* ----- SESSION -----

  [[blocks.segments]]
  type = "session"
  style = "powerline"
  powerline_symbol = ""
  template = " {{ .UserName }}@{{ .HostName }} "
  background = "p:black"
  foreground = "p:blue"

#* ----- PATH -----
  [[blocks.segments]]
  type = "path"
  style = "powerline"
  powerline_symbol = ""
  template = "  {{ .Path }} "
  foreground = "p:black"
  background = "p:blue"

    [blocks.segments.options]
    style = "agnoster_short"
    display_root = true
    folder_icon = "**"

#* ----- GIT -----
  [[blocks.segments]]
  type = "git"
  style = "powerline"
  powerline_symbol = ""
  template = " {{ .HEAD }} "
  foreground = "p:white"
  background = "p:orange"

    [blocks.segments.options]
    branch_template = "{{ trunc 25 .Branch }}"
    fetch_status = false
    fetch_upstream_icon = false

#* ----- PYTHON VENV -----
  [[blocks.segments]]
  type = "python"
  style = "powerline"
  powerline_symbol = ""
  template = "  {{ if .Venv }}{{ .Full }}{{ end }} "
  foreground = "p:green"
  background = "p:black"

    [blocks.segments.options]
    fetch_virtual_env = true
    display_mode = "environment"

#* ----- RUST -----
  [[blocks.segments]]
  type = "rust"
  style = "diamond"
  template = "  {{ .Full }} "
  leading_diamond = "<transparent,background></>"
  trailing_diamond = ""
  powerline_symbol = ""
  foreground = "p:white"
  background = "p:red"

#* ----- ROOT -----
  [[blocks.segments]]
  type = "root"
  style = "powerline"
  template = "  " # Volt
  foreground = "p:orange"
  powerline_symbol = ""
  background = "p:black"

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

#* ----- STATUS -----
  [[blocks.segments]]
  type = "status"
  style = "diamond"
  template = " {{ if gt .Code 0 }}{{ .Code }} {{ else }}{{ end }} "
  trailing_diamond = ""
  background = "p:green"

  background_templates = ["{{ if eq .Code 0 }}p:green{{ else }}p:red{{ end }}"]
  foreground_templates = ["{{ if eq .Code 0 }}p:black{{ else }}p:white{{ end }}"]

    [blocks.segments.properties]
    always_enabled = true

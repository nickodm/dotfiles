# Theme made for simple terminals that can't handle icons, powerlines and background colors.

#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

console_title_template = "{{ .Shell }} in {{ .Folder }}"
version = 3
final_space = true

[palette]
black = "#262B44"
blue = "#4B95E9"
green = "#59C9A5"
orange = "#F07623"
red = "#D81E5B"
white = "#E0DEF4"
yellow = "#F3AE35"

[secondary_prompt]
template = "> "
foreground = "p:white"
background = "transparent"

[transient_prompt]
template = "{{ .PWD }} > "
foreground_templates = [ "{{ if gt .Code 0 }}p:red{{ else }}p:green{{ end }}" ]

[upgrade]
source = "cdn"
interval = "168h"
auto = true
notice = true

[[blocks]]
type = "prompt"
alignment = "left"

#* ----- OS ------
  [[blocks.segments]]
  type = "os"
  style = "plain"
  template = "[{{.OS}}] "
  foreground = "p:blue"
  foreground_templates = [
  "{{ if eq .OS \"ubuntu\" }}p:red{{ end }}",
  "{{ if eq .OS \"android\" }}p:green{{ end }}"
]

#* ----- BATTERY -----
  [[blocks.segments]]
  type = "battery"
  style = "plain"
  template = "{{ if not .Error }}[{{ .Icon }}{{ .Percentage }}%] {{ end }}"
  foreground_templates = [
    "{{ if lt .Percentage 30 }}p:red{{ end }}",
    "{{ if lt .Percentage 50 }}p:orange{{ end }}",
    "{{ if le .Percentage 100 }}p:green{{ end }}",
  ]

    [block.segments.options]
    charging_icon = "^"
    discharging_icon = "!"

#* ----- PATH ------
  [[blocks.segments]]
  template = "{{ path .Path .Location }} "
  foreground = "p:green"
  type = "path"
  style = "plain"

    [blocks.segments.options]
    style = "folder"

#* ----- PYTHON VENV ------
  [[blocks.segments]]
  template = "  {{ if .Venv }}{{ .Full }}{{ end }} "
  foreground = "p:red"
  type = "python"
  style = "plain"

    [blocks.segments.options]
    fetch_virtual_env = true
    display_mode = "environment"

#* ----- RUST ------
  [[blocks.segments]]
  type = "rust"
  template = "{{ .Full }} "
  style = "plain"
  foreground = "p:orange"

#* ----- GIT ------
  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground = "p:orange"
  template = "({{ trunc 25 .HEAD }}) "

    [blocks.segments.properties]
    branch_icon = "" # Hide the git icon
    fetch_status = false
    fetch_upstream_icon = false

#* ----- ROOT ------
  [[blocks.segments]]
  type = "root"
  template = "(root) "
  foreground = "p:red"
  style = "plain"

[[blocks]]
type = "rprompt"
alignment = "right"

  [[blocks.segments]]
  template = "in <p:blue><b>{{ .Name }}</b></> "
  foreground = "p:white"
  background = "transparent"
  type = "shell"
  style = "plain"

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

#* ----- STATUS ------
  [[blocks.segments]]
  type = "status"
  template = ">"
  foreground = "p:green"
  style = "plain"
  foreground_templates = [ "{{ if gt .Code 0 }}p:red{{ end }}" ]

    [blocks.segments.properties]
    always_enabled = true

